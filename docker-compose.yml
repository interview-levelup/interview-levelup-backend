version: "3.9"

services:
  # ──────────────────────────────────────────
  # PostgreSQL
  # ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # # ──────────────────────────────────────────
  # # Python AI Agent (FastAPI / LangGraph)
  # # ──────────────────────────────────────────
  # agent:
  #   build:
  #     context: ../interview-levelup-agent
  #     dockerfile: Dockerfile
  #   restart: unless-stopped
  #   environment:
  #     LLM_MODEL: ${LLM_MODEL}
  #     LLM_API_KEY: ${LLM_API_KEY}
  #     LLM_BASE_URL: ${LLM_BASE_URL}
  #   ports:
  #     - "8000:8000"
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl -sf http://localhost:8000/docs || exit 1"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 10

  # ──────────────────────────────────────────
  # Go / Gin Backend
  # ──────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      agent:
        condition: service_healthy
    environment:
      PORT: "8080"
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: disable
      AGENT_BASE_URL: "http://agent:8000"
    ports:
      - "8080:8080"

volumes:
  postgres_data:
